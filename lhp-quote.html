<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600;700&display=swap" rel="stylesheet">
<title>Your painting quote</title>
<!--
  ═══════════════════════════════════════════════════════════════════════
  LHP FINAL QUOTE · standalone page (mocked inputs)
  ─────────────────────────────────────────────────────────────────────
  A static quote page (not the chat flow). Price is itemised BY WORK
  CATEGORY (interior / exterior / damages / waterproofing / add-ons),
  then Full → Discount (25%) → Final. "Your home, room by room" is scope
  only. Tap a room → photo GALLERY. Customize → full-screen EDITOR that
  edits options AND pictures, with live pricing.

  @integration: QUOTE is a mock seed here — in production it comes from the
  cart + the capture pipeline. Photo capture uses a file input as a stand-in;
  wall-detection (`detected`) would come from the vision service.
  ═══════════════════════════════════════════════════════════════════════
-->
<style>
:root{
  --purple:#6D3FF2; --purple-dark:#5B2ED9; --purple-tint:#F3EEFE;
  --green:#07794C; --green-tint:#EAF4EF; --red:#E23B3B;
  --ink:#0F0F0F; --ink-2:#545454; --ink-3:#8A8A8A;
  --line:#ECECEF; --line-soft:#F3F3F6;
  --bg:#FFFFFF; --bg-soft:#F8F8FA;
  --radius:14px;
  --shadow-soft:0 4px 22px rgba(15,15,25,.055);
  --shadow-btn:0 6px 16px rgba(109,63,242,.22);
  --font:"Figtree",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{font-family:var(--font);color:var(--ink);background:#EDEDF0;-webkit-font-smoothing:antialiased}
button{font-family:inherit;color:inherit;background:none;border:none;cursor:pointer;font-size:inherit}
img,svg{display:block}

#app{max-width:430px;height:100dvh;overflow:hidden;margin:0 auto;background:var(--bg);position:relative;
     display:flex;flex-direction:column;box-shadow:0 0 60px rgba(0,0,0,.10)}
.topbar{position:sticky;top:0;z-index:30;background:var(--bg);border-bottom:1px solid var(--line-soft);
        display:flex;align-items:center;gap:10px;padding:14px 16px}
.topbar .back{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin-left:-4px}
.topbar .back svg{width:20px;height:20px}
.topbar .back:active{background:var(--bg-soft)}
.topbar h1{font-size:16px;font-weight:700;letter-spacing:-.01em;flex:1}
.badge-offer{font-size:11.5px;font-weight:700;color:#fff;background:var(--purple);padding:5px 10px;border-radius:999px;white-space:nowrap}
.scroll{flex:1;overflow-y:auto;padding:16px 16px 120px}

/* ── summary card ── */
.q-summary{background:#fff;border:1px solid var(--line-soft);border-radius:18px;padding:16px 16px 18px;box-shadow:var(--shadow-soft)}
.q-sum-h{font-size:13px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:var(--ink-3);margin-bottom:12px}
.q-sum-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.q-sum-edit{font-size:12.5px;font-weight:600;color:var(--purple);text-decoration:underline;text-underline-offset:3px}
.gp-sub{font-size:13px;font-weight:600;color:var(--ink);margin:0 2px 8px}
.gp-special{width:100%;display:flex;align-items:center;justify-content:space-between;gap:10px;padding:13px 2px;border:0;border-bottom:1px solid var(--line-soft);background:none;font-weight:700;font-size:14px;color:var(--ink);text-align:left}
.gp-special:active{opacity:.6}
.q-cat{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;padding:9px 0;font-size:14px}
.q-cat .lab{color:var(--ink);font-weight:700}
.q-cat-sub{display:block;font-size:11.5px;color:var(--ink-3);font-weight:600;line-height:1.4;margin-top:3px}
.q-cat .amt{font-weight:700;font-variant-numeric:tabular-nums}
.q-div{height:1px;background:var(--line);margin:11px 0}
.q-line{display:flex;align-items:baseline;justify-content:space-between;gap:12px;padding:3px 0;font-variant-numeric:tabular-nums}
.q-full .amt{font-weight:700}
.q-full .lab,.q-disc .lab{font-size:14px;color:var(--ink-2)}
.q-disc{color:var(--green);background:var(--green-tint);border-radius:10px;padding:9px 11px;margin:6px 0}
.q-disc .lab{font-size:14px;font-weight:600;color:var(--green)}
.q-disc .amt{font-weight:600;color:var(--green)}
.party{display:inline-block;transform-origin:center;animation:partySpin 2.4s cubic-bezier(.5,0,.5,1) infinite}
@keyframes partySpin{
  0%,68%{transform:rotate(0) scale(1)}
  82%{transform:rotate(210deg) scale(1.3)}
  100%{transform:rotate(360deg) scale(1)}
}
@media (prefers-reduced-motion:reduce){.party{animation:none}}
.q-final{margin-top:9px;align-items:center}
.q-final .lab{font-size:15px;font-weight:600}
.q-final .amt{font-size:24px;font-weight:600;letter-spacing:-.02em}

.sec-h2{font-size:18px;font-weight:600;letter-spacing:-.02em;margin:22px 2px 12px;display:flex;align-items:center;gap:9px}
.home-badge{display:inline-flex;width:30px;height:30px;flex:none;border-radius:50%;background:var(--purple);align-items:center;justify-content:center;transform-origin:center;animation:homeSpin 3s ease-in-out infinite}
.home-badge svg{width:16px;height:16px;stroke:#fff}
@keyframes homeSpin{0%,72%{transform:rotate(0)}86%{transform:rotate(200deg)}100%{transform:rotate(360deg)}}
@media (prefers-reduced-motion:reduce){.home-badge{animation:none}}

/* ── room card ── */
.q-room{background:#fff;border:1px solid var(--line-soft);border-radius:16px;padding:14px;margin-bottom:12px;box-shadow:var(--shadow-soft)}
.q-rhead{display:flex;align-items:center;gap:10px;margin-bottom:11px}
.q-ic{width:30px;height:30px;flex:none;border-radius:9px;background:var(--purple-tint);display:flex;align-items:center;justify-content:center}
.q-ic svg{width:16px;height:16px}
.q-rname{flex:1;font-size:15.5px;font-weight:600;letter-spacing:-.01em}
.q-del{width:30px;height:30px;flex:none;border-radius:8px;display:flex;align-items:center;justify-content:center;color:var(--ink-3)}
.q-del svg{width:16px;height:16px}
.q-del:active{background:var(--bg-soft);color:var(--red)}
.q-chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px}
.q-chip{font-size:11.5px;font-weight:700;color:var(--ink-2);background:var(--bg-soft);border:1px solid var(--line);
        padding:5px 9px;border-radius:999px;white-space:nowrap}
.q-chip.tier{color:var(--purple);background:var(--purple-tint);border-color:#E3D9FB}
.q-chip.muted{color:var(--ink-3)}
.q-chip.warn{color:#fff;background:var(--red);border-color:var(--red)}
.q-chip.tc.on b{color:var(--green)}
.q-chip.tc.off{color:var(--ink-3)}
.q-chip.tc.off b{color:var(--ink-3)}
/* editor room-summary card */
.rs-card{border:1px solid var(--line-soft);border-radius:12px;padding:2px 12px;background:var(--bg-soft)}
.rs-row{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:9px 0;border-bottom:1px solid var(--line);font-size:13px;font-weight:600;color:var(--ink)}
.rs-row:last-child{border-bottom:0}
.rs-val{font-weight:700;color:var(--ink);white-space:nowrap}
.rs-val.cost{color:var(--purple);font-weight:600}
.q-thumbs{display:flex;gap:6px;overflow-x:auto;padding-bottom:3px;margin-bottom:12px;scrollbar-width:none}
.q-thumbs::-webkit-scrollbar{display:none}
.q-thumb{width:64px;height:64px;flex:none;border-radius:10px;overflow:hidden;background:var(--purple-tint);border:1.5px solid var(--line)}
.q-thumb.bad{border-color:var(--red)}
.q-thumb img{width:100%;height:100%;object-fit:cover}
.q-more{width:64px;height:64px;flex:none;border-radius:10px;background:var(--bg-soft);border:1.5px dashed #D3C6F2;
        display:flex;align-items:center;justify-content:center;font-size:12.5px;font-weight:600;color:var(--purple)}
.q-acts{display:flex;gap:9px}
.q-btn{flex:1;padding:11px;border-radius:11px;font-weight:600;font-size:13.5px;border:1.5px solid var(--line);background:#fff;color:var(--ink)}
.q-btn:active{transform:scale(.98)}
.q-btn.primary{background:var(--purple-tint,#EEE9FC);color:var(--purple);border-color:var(--purple)}
.q-addrow{display:flex;gap:9px;margin:14px 0 2px}
.q-ext-add{flex:1;padding:14px;border-radius:14px;border:1.5px dashed #D3C6F2;background:#fff;color:var(--purple);font-weight:600;font-size:13.5px}
.q-ext-add:active{background:var(--purple-tint)}

/* ── sticky footer ── */
.q-close{text-align:center;font-size:14px;color:var(--ink-2);font-weight:700;margin:22px 2px 12px}
.q-viewquote{width:100%;padding:15px;border-radius:14px;background:var(--purple);color:#fff;font-weight:600;font-size:15px;box-shadow:var(--shadow-btn)}
.q-viewquote:active{background:var(--purple-dark)}
.q-foot{position:absolute;left:0;right:0;bottom:0;z-index:20;max-width:430px;margin:0 auto;background:#fff;
        border-top:1px solid var(--line);padding:12px 16px calc(14px + env(safe-area-inset-bottom));
        display:flex;align-items:center;gap:12px}
.q-foot .fsave{flex:1;font-size:12px;font-weight:700;color:var(--green)}
.q-foot .fsave b{display:block;font-size:16px;color:var(--ink);font-weight:600}
.q-cta{padding:13px 16px;border-radius:13px;background:var(--purple);color:#fff;font-weight:600;font-size:13.5px;box-shadow:var(--shadow-btn);white-space:nowrap}
.q-cta:active{background:var(--purple-dark)}

/* ── full-screen overlay (gallery + editor) ── */
.ov{position:fixed;inset:0;z-index:80;max-width:430px;margin:0 auto;background:var(--bg);display:flex;flex-direction:column;animation:ovin .24s ease}
@keyframes ovin{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
.ov-top{position:sticky;top:0;background:var(--bg);border-bottom:1px solid var(--line-soft);display:flex;align-items:center;gap:10px;padding:14px 16px}
.ov-x{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:var(--bg-soft)}
.ov-x svg{width:18px;height:18px}
.ov-title{font-size:16px;font-weight:600;letter-spacing:-.01em;flex:1}
.ov-scroll{flex:1;overflow-y:auto;padding:16px 16px 120px}

.pcsub{font-size:11.5px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:var(--ink-3);margin:16px 2px 9px}
.pcsub:first-child{margin-top:2px}
.pgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.pcell{position:relative;aspect-ratio:1/1;border-radius:12px;overflow:hidden;background:var(--purple-tint);border:1.5px solid var(--line)}
.pcell img{width:100%;height:100%;object-fit:cover}
.pcell.empty{border-style:dashed;border-color:#D3C6F2;display:flex;align-items:center;justify-content:center;color:var(--purple);font-size:26px;font-weight:400}
.pcell .pedit{position:absolute;right:5px;top:5px;width:22px;height:22px;border-radius:50%;background:rgba(15,15,15,.55);color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px}
/* wall-not-detected */
.pcell.bad{border-color:var(--red)}
.pcell.bad img{filter:brightness(.55) saturate(.85)}
.warnov{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:7px;padding:8px;text-align:center;background:rgba(150,15,15,.30)}
.warnov .ex{width:30px;height:30px;border-radius:50%;background:var(--red);color:#fff;font-weight:600;font-size:19px;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 10px rgba(0,0,0,.35)}
.warnov .wt{color:#fff;font-size:11px;font-weight:600;line-height:1.3;text-shadow:0 1px 5px rgba(0,0,0,.6)}
.recap{margin-top:2px;font-size:10.5px;font-weight:600;color:var(--red);background:#fff;border-radius:999px;padding:5px 11px}

/* ── editor controls ── */
.ed-room-hd{font-size:12px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:var(--ink-3);margin:4px 2px 10px}
.ed-row{padding:13px 0;border-bottom:1px solid var(--line-soft)}
.ed-row:last-of-type{border-bottom:0}
.ed-top{display:flex;align-items:center;justify-content:space-between;gap:12px}
.ed-lab{font-size:14.5px;font-weight:700}
.ed-price{font-size:12.5px;font-weight:600;color:var(--purple);white-space:nowrap}
.ed-price.zero{color:var(--ink-3)}
.seg{display:inline-flex;border:1.5px solid var(--line);border-radius:10px;overflow:hidden}
.seg button{padding:7px 16px;font-size:13px;font-weight:700;color:var(--ink-2)}
.seg button.on{background:var(--purple);color:#fff}
.stepper{display:inline-flex;align-items:center;gap:0;border:1.5px solid var(--line);border-radius:10px;overflow:hidden}
.stepper button{width:36px;height:34px;font-size:19px;font-weight:700;color:var(--purple)}
.stepper button:disabled{color:var(--line);cursor:default}
.stepper .n{min-width:30px;text-align:center;font-weight:600;font-variant-numeric:tabular-nums}
.tiles{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:11px}
.tile{border:1.5px solid var(--line);border-radius:12px;background:#fff;padding:12px 10px;display:flex;flex-direction:column;align-items:center;gap:3px;text-align:center}
.tile .tn{font-size:13px;font-weight:700}
.tile .tp{font-size:12.5px;font-weight:600;color:var(--purple)}
.tile.on{background:var(--purple);border-color:var(--purple)}
.tile.on .tn,.tile.on .tp{color:#fff}
.chiprow{display:flex;flex-wrap:wrap;gap:7px;margin-top:11px}
.pchip{padding:8px 13px;border-radius:10px;border:1.5px solid var(--line);background:#fff;font-weight:700;font-size:12.5px;color:var(--ink)}
.pchip.on{background:var(--purple);color:#fff;border-color:var(--purple)}
.pchip:disabled{opacity:.4}
.ed-sub{font-size:12px;color:var(--ink-3);margin-top:3px}
.ed-foot{position:absolute;left:0;right:0;bottom:0;max-width:430px;margin:0 auto;background:#fff;border-top:1px solid var(--line);
         padding:12px 16px calc(14px + env(safe-area-inset-bottom));display:flex;align-items:center;gap:12px}
.ed-reset{font-size:13px;font-weight:600;color:var(--ink-3);text-decoration:underline;text-underline-offset:3px}
.ed-total{flex:1;text-align:right;font-size:12px;color:var(--ink-3);font-weight:700}
.ed-total b{display:block;font-size:18px;color:var(--ink);font-weight:600}
.ed-done{padding:13px 24px;border-radius:12px;background:var(--purple);color:#fff;font-weight:600;font-size:15px;box-shadow:var(--shadow-btn)}
/* add-area picker */
.area-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.area-opt{display:flex;flex-direction:column;align-items:flex-start;gap:9px;padding:16px 14px;border:1.5px solid var(--line);border-radius:14px;background:#fff;text-align:left;font-weight:700;font-size:14px}
.area-opt:active{background:var(--purple-tint);border-color:var(--purple)}
.area-opt .ai{width:34px;height:34px;border-radius:9px;background:var(--purple-tint);display:flex;align-items:center;justify-content:center}
.area-opt .ai svg{width:18px;height:18px}
/* bottom sheet */
.sheet-ov{position:fixed;inset:0;z-index:85;max-width:430px;margin:0 auto;display:flex;align-items:flex-end;background:rgba(15,15,20,.42);opacity:0;transition:opacity .25s ease}
.sheet-ov.open{opacity:1}
.sheet{width:100%;background:#fff;border-radius:22px 22px 0 0;padding:10px 18px calc(20px + env(safe-area-inset-bottom));
  transform:translateY(100%);transition:transform .3s cubic-bezier(.22,.61,.36,1);max-height:82%;overflow-y:auto;box-shadow:0 -10px 40px rgba(0,0,0,.18)}
.sheet-ov.open .sheet{transform:translateY(0)}
.sheet-grab{width:40px;height:4px;border-radius:2px;background:var(--line);margin:2px auto 14px}
.sheet-title{font-size:17px;font-weight:600;letter-spacing:-.01em;margin:0 2px 14px}
.confirm-title{font-size:17px;font-weight:600;letter-spacing:-.01em;margin:4px 2px 6px}
.confirm-sub{font-size:13px;color:var(--ink-2);margin-bottom:16px}
.confirm-actions{display:flex;gap:10px}
.confirm-cancel{flex:1;padding:13px;border-radius:12px;border:1.5px solid var(--line);background:#fff;font-weight:600;font-size:14px}
.confirm-del{flex:1;padding:13px;border-radius:12px;border:0;background:var(--red);color:#fff;font-weight:600;font-size:14px}
/* exterior per-wall cards */
.ext-wall{border:1px solid var(--line-soft);border-radius:12px;padding:10px;margin-bottom:10px;display:flex;gap:10px}
.ew-thumb{position:relative;width:66px;height:66px;flex:none;border-radius:9px;overflow:hidden;background:var(--purple-tint)}
.ew-flag{position:absolute;left:3px;bottom:3px;font-size:8.5px;font-weight:600;color:#fff;background:rgba(226,59,59,.92);padding:2px 5px;border-radius:5px}
.ew-clean{font-size:12px;color:var(--green);font-weight:700}
.ew-thumb img{width:100%;height:100%;object-fit:cover}
.ew-body{flex:1;min-width:0;display:flex;flex-direction:column;gap:9px}
.ew-hd{display:flex;align-items:center;gap:8px;font-size:14px}
.ew-hd b{flex:1}
.ew-price{font-size:12px;font-weight:600;color:var(--purple)}
.ew-x{width:26px;height:26px;flex:none;border-radius:7px;display:flex;align-items:center;justify-content:center;color:var(--ink-3)}
.ew-x svg{width:15px;height:15px}
.ew-row{display:flex;align-items:center;justify-content:space-between;gap:8px;font-size:13px;font-weight:600;color:var(--ink-2)}
.ew-p2{font-size:11px;font-weight:600;color:var(--purple);margin-left:6px}
.ew-lab{display:flex;flex-direction:column;font-weight:700;color:var(--ink)}
.ew-lab em{font-style:normal;font-size:11px;color:var(--ink-3);font-weight:600;margin-top:1px}
.det-lab{display:flex;align-items:center;gap:10px}
.det-ic{width:30px;height:30px;flex:none;border-radius:8px;background:var(--purple-tint);display:flex;align-items:center;justify-content:center}
.det-ic svg{width:17px;height:17px}
.det-txt{display:flex;flex-direction:column;font-weight:700}
.det-txt em{font-style:normal;font-size:11px;color:var(--ink-3);font-weight:600;margin-top:1px}
.det-cta{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:10px 12px;border:1px solid var(--line);border-radius:11px;margin-bottom:8px;background:var(--bg-soft)}
/* detection photo card (badge + floating add pill) */
.dc{position:relative;border-radius:16px;overflow:hidden;margin-bottom:12px;background:var(--purple-tint)}
.dc>img{width:100%;display:block;max-height:300px;object-fit:cover}
.dc-badge{position:absolute;top:11px;left:11px;background:var(--red);color:#fff;font-weight:600;font-size:13px;padding:6px 12px;border-radius:11px;box-shadow:0 3px 10px rgba(0,0,0,.28)}
.dc-add{position:absolute;left:11px;right:11px;bottom:11px;display:flex;align-items:center;gap:11px;background:#fff;border:1.5px solid #C7B8ED;border-radius:15px;padding:11px 14px;box-shadow:0 8px 22px rgba(0,0,0,.20)}
.dc-add:active{transform:scale(.99)}
.dc-add .dc-ic{width:34px;height:34px;flex:none;border-radius:50%;background:var(--purple-tint);display:flex;align-items:center;justify-content:center}
.dc-add .dc-ic svg{width:18px;height:18px}
.dc-add .dc-txt{display:flex;flex-direction:column;text-align:left;line-height:1.25;color:var(--purple)}
.dc-add .dc-txt span{font-weight:600;font-size:15px}
.dc-add .dc-txt b{font-weight:600;font-size:13px}
.dc-add.on{background:var(--purple);border-color:var(--purple)}
.dc-add.on .dc-txt{color:#fff}
.dc-add.on .dc-ic{background:rgba(255,255,255,.22)}
.fx-btn{width:100%;margin-top:8px;padding:12px;border-radius:11px;border:1.5px solid var(--purple);background:var(--purple-tint);color:var(--purple);font-weight:600;font-size:13.5px}
.fx-btn:active{background:#EAE2FB}
.fx-img{border-radius:12px;overflow:hidden;background:var(--purple-tint);margin-bottom:14px;min-height:120px;display:flex;align-items:center;justify-content:center}
.fx-img img{width:100%;display:block}
.fx-status{padding:34px 16px;color:var(--ink-3);font-weight:600;font-size:13px;text-align:center;line-height:1.5}
@keyframes edIn{from{opacity:0;transform:translateY(9px)}to{opacity:1;transform:none}}
@media (prefers-reduced-motion:reduce){#qed-scroll>*{animation:none!important}}
</style>
</head>
<body>
<div id="app"></div>
<script>
/* ═══════════════════════════════════════════════════════════════════════
   PORTED CONSTANTS (from the main flow) + icons
   ═══════════════════════════════════════════════════════════════════════ */

function roomIcon(name){
  if(/^bedroom|bed\b|guest\s*room|master/i.test(name)) return I.bed;
  if(/dining/i.test(name))         return I.dining;
  if(/living|lounge|hall|drawing/i.test(name)) return I.sofa;
  if(/kitchen/i.test(name))        return I.kitchenIcon;
  if(/bath|washroom|toilet|powder/i.test(name)) return I.bath;
  if(/balcony|terrace|verandah|deck/i.test(name)) return I.balcony;
  if(/pooja|puja|prayer|mandir|temple/i.test(name)) return I.pooja;
  if(/study|office|work/i.test(name)) return I.study;
  if(/store|storage|utility|closet/i.test(name)) return I.store;
  if(/exterior/i.test(name))       return I.frame;
  return I.dot;
}

/* ═══════════════════════════════════════════════════════════════════════
   PRICING — tunable rate card. @integration: real rates from backend.
   Prices by ACTUAL per-room scope (not BHK×tier like the chat estimate).
   ═══════════════════════════════════════════════════════════════════════ */
const RATES = {
  wallPerTier:    { economy:900,  premium:1300, luxury:1750, superluxury:2200 },
  ceilingPerTier: { economy:1100, premium:1500, luxury:2000, superluxury:2500 },
  repairPerRoom:        300,    // per room/wall (one SKU)
  waterproofingPerRoom: 900,    // per room/wall (one SKU)
  exteriorPerTier: { economy:1100, premium:1600, luxury:2100, superluxury:2600 },
  bathroomPerRoom:      0,     // hook: attached bath is scope-only for now
};
function roomWallsAmount(r){ return r.walls * (RATES.wallPerTier[r.wallPaint]||0); }
function roomCeilingAmount(r){ return r.ceiling ? (RATES.ceilingPerTier[r.ceilingPaint]||0) : 0; }
/* items the vision service "finds" in the room photos → offer a treatment.
   @integration: door/window/grill detection + real prices come from backend. */
const DETECTED = [
  { key:'door',   label:'Found door',   treat:'Add door enamel polish',  price:2199, icon:I.door },
  { key:'window', label:'Found window', treat:'Add window enamel polish', price:1499, icon:I.window },
  { key:'grill',  label:'Found grill',  treat:'Add grill painting',       price:900,  icon:I.grill },
  { key:'cabinet',label:'Found cabinet',treat:'Add cabinet enamel polish',price:1799, icon:I.cabinet },
];
function roomAddonsAmount(r){ return DETECTED.reduce((s,d)=> s + ((r.addons[d.key] && r.addons[d.key].qty>0) ? d.price : 0), 0); }
function quoteTotals(Q){
  let interior=0, damages=0, wproof=0, damagesN=0, wproofN=0;
  const akN = {door:0,window:0,grill:0,cabinet:0}, akAmt = {door:0,window:0,grill:0,cabinet:0};
  Q.rooms.forEach(r=>{
    interior += roomWallsAmount(r) + roomCeilingAmount(r);   // walls + ceiling
    if(r.repair)        { damages += RATES.repairPerRoom; damagesN++; }
    if(r.waterproofing) { wproof  += RATES.waterproofingPerRoom; wproofN++; }
    DETECTED.forEach(d=>{ if(r.addons[d.key] && r.addons[d.key].qty>0){ akN[d.key]++; akAmt[d.key]+=d.price; } });
  });
  const addons = akAmt.door + akAmt.window + akAmt.grill + akAmt.cabinet;
  const ext = Q.exterior;
  const exterior = (ext.enabled && ext.tier) ? ext.walls.length * RATES.exteriorPerTier[ext.tier] : 0;
  if(ext.enabled) ext.walls.forEach(w=>{ if(w.waterproofing){ wproof += RATES.waterproofingPerRoom; wproofN++; } if(w.repair){ damages += RATES.repairPerRoom; damagesN++; } });
  // detected repairs added one-by-one from the repairs sheet (× each photo)
  const _ri = Q._repairItems || [];
  const aW = _ri.filter(x=>x.key==='wproof'  && x.added).length;
  const aD = _ri.filter(x=>x.key==='damages' && x.added).length;
  wproof  += aW * RATES.waterproofingPerRoom; wproofN  += aW;
  damages += aD * RATES.repairPerRoom;        damagesN += aD;
  const categories = [
    { key:'interior', label:`Interior painting`, sub:'2 coats premium emulsion · walls & ceilings · primer', amount:interior },
    { key:'exterior', label:'Exterior painting', sub:'Weatherproof exterior emulsion', amount:exterior },
    { key:'damages',  label: damagesN ? `Damage repair × ${damagesN} wall${damagesN>1?'s':''}` : 'Damage repair',  sub:'Crack-filling, plaster patch & surface prep', amount:damages, rec: damages===0 && !!(Q.detected && Q.detected.damage), why:'We detected a damaged wall. Painting over cracks and uneven plaster gives a patchy finish and the new paint can flake within months — repairing first ensures a smooth, long-lasting result.' },
    { key:'wproof',   label: wproofN ? `Waterproofing × ${wproofN} wall${wproofN>1?'s':''}` : 'Waterproofing',     sub:'Seepage treatment before painting', amount:wproof, rec: wproof===0 && !!(Q.detected && Q.detected.seepage), why:'We detected seepage. Untreated, moisture keeps pushing through the wall and the fresh paint bubbles and peels — and the paint warranty won\'t cover a wall with untreated seepage.' },
    { key:'door',    label:`Door painting × ${akN.door}`,     sub:'Enamel finish',        amount:akAmt.door },
    { key:'window',  label:`Window painting × ${akN.window}`, sub:'Enamel finish',        amount:akAmt.window },
    { key:'grill',   label:`Grill painting × ${akN.grill}`,   sub:'Metal enamel',         amount:akAmt.grill },
    { key:'cabinet', label:`Cabinet painting × ${akN.cabinet}`, sub:'Enamel / wood finish', amount:akAmt.cabinet },
  ].filter(c => c.amount > 0 || c.rec || (c.key==='exterior' && Q.exterior.enabled))
   .sort((a,b) => (a.rec?1:0) - (b.rec?1:0));   // not-yet-added (recommended) damage/waterproofing sink to the bottom
  const full = interior + exterior + damages + wproof + addons;
  const discount = Math.min(full, 1500);   // flat ₹1,500 off
  return { categories, full, discount, final: full - discount };
}

function thumbsHtml(r){
  const all = [].concat(
    r.photos.walls.map(p=>({p,bad:p.detected===false})),
    r.photos.door.map(p=>({p})), r.photos.grill.map(p=>({p})),
    r.photos.cabinet.map(p=>({p})), r.photos.bathroom.map(p=>({p})));
  if(!all.length) return `<div class="q-thumbs"><div class="q-more" data-act="q:customize:${r.id}">+ Add</div></div>`;
  const shown = all.slice(0,5).map(x=>`<div class="q-thumb ${x.bad?'bad':''}"><img src="${x.p.src}" alt=""></div>`).join('');
  const more = all.length>5 ? `<div class="q-more" data-act="q:gallery:${r.id}">+${all.length-5}</div>` : '';
  return `<div class="q-thumbs" data-act="q:gallery:${r.id}">${shown}${more}</div>`;
}
function chipsHtml(r){
  // one ticked chip per service selected for this room, with quantities
  const c = [];
  const tc = label => `<span class="q-chip tc on">${label} <b>✓</b></span>`;
  c.push(tc(`${r.walls} wall${r.walls>1?'s':''}${r.ceiling?' + 1 ceiling':''} · Paint`));
  const wq = (r.waterproofing?1:0) + repairItemCount('wproof', r.id);
  if(wq) c.push(tc('Waterproofing × ' + wq));
  const dq = (r.repair?1:0) + repairItemCount('damages', r.id);
  if(dq) c.push(tc('Damage repair × ' + dq));
  if(r.addons.door.qty>0)    c.push(tc(`Door paint × ${r.addons.door.qty}`));
  if(r.addons.window.qty>0)  c.push(tc(`Window paint × ${r.addons.window.qty}`));
  if(r.addons.grill.qty>0)   c.push(tc(`Grill paint × ${r.addons.grill.qty}`));
  if(r.addons.cabinet.qty>0) c.push(tc(`Cabinet paint × ${r.addons.cabinet.qty}`));
  if(r.bathroom) c.push(tc('Attached bathroom'));
  if(r.balcony)  c.push(tc('Balcony'));
  if(r.flags.wallUndetected) c.push(`<span class="q-chip warn">⚠ Recapture a wall</span>`);
  return c.join('');
}

  rows += L('Attached bathroom', r.bathroom ? 'Yes' : 'No');
  rows += L('Attached balcony', r.balcony ? 'Yes' : 'No');
  rows += L('Wall paint', paintLabel(r.wallPaint));
  if(r.ceiling)  rows += L('Ceiling paint', paintLabel(r.ceilingPaint));
  DETECTED.forEach(d=>{ if(r.addons[d.key] && r.addons[d.key].qty) rows += L(ADDON_LABELS[d.key], inr(d.price), true); });
  if(r.repair)        rows += L('Repair', inr(RATES.repairPerRoom), true);

async function deleteTestData(){
  const btn = document.getElementById('delTestBtn'), msg = document.getElementById('delTestMsg');
  let sess = null; try { sess = JSON.parse(sessionStorage.getItem('LHP_SESSION') || 'null'); } catch(e){}
  if(!sess || !sess.surveyId){ if(msg) msg.textContent = 'No backend session found (ran in simulate mode — nothing to delete).'; return; }
  if(btn){ btn.disabled = true; btn.textContent = 'Deleting…'; }
  try {
    const url = (sess.api || '') + '/api/delete-session' + (sess.key ? ('?auth_key=' + encodeURIComponent(sess.key)) : '');
    const r = await fetch(url, { method:'POST', headers:{ 'Content-Type':'application/json' }, body: JSON.stringify({ surveyId: sess.surveyId }) });
    const j = await r.json();
    if(!j.ok) throw new Error(j.error || 'delete failed');
    sessionStorage.removeItem('LHP_SESSION');
    if(btn){ btn.textContent = 'Deleted ✓'; btn.style.background = '#07794C'; }
    if(msg) msg.textContent = `Deleted ${j.imagesDeleted} image(s) + all analysis for this session.`;
  } catch(e){
    if(msg) msg.textContent = 'Delete failed: ' + (e && e.message ? e.message : e);
    if(btn){ btn.disabled = false; btn.textContent = 'Retry delete'; }
  }
}

/* ═══════════════════════════════════════════════════════════════════════
   CAPTURE (mock) — file input stands in for the camera.
   @integration: real uploader returns stored URL + `detected` verdict.
   ═══════════════════════════════════════════════════════════════════════ */
function pickImage(cb){
  const inp = document.createElement('input');
  inp.type='file'; inp.accept='image/*'; inp.setAttribute('capture','environment');
  inp.onchange = () => { const f=inp.files && inp.files[0]; if(!f) return;
    const rd=new FileReader(); rd.onload=()=>cb(rd.result); rd.readAsDataURL(f); };
  inp.click();
}

/* ═══════════════════════════════════════════════════════════════════════
   GEMINI — empty-room preview (strip movable objects, keep fixed structures)
   @integration: for a shared/deployed build, call your /api/empty-room proxy
   instead of putting GEMINI_KEY in the client.
   ═══════════════════════════════════════════════════════════════════════ */
const GEMINI_KEY = '';                              // ← paste locally; never commit/share this copy
const IMG_MODEL  = 'gemini-2.5-flash-image';        // you said "gemini 3.1 flash image" — set to your console's id
const EMPTY_PROMPT = `Edit this photo of a room to REMOVE all movable / free-standing objects, so only the empty room and its fixed structures remain.

REMOVE: free-standing furniture, chairs, tables, sofas, beds, free-standing wardrobes, decor, plants, rugs, boxes, appliances, light fixtures, curtains, curtain rods, stabilizer, paintings on the walls, mattress or any other object on floor that are not built in, and any clutter in front of the walls.

KEEP EXACTLY AS-IS (do not move, resize, restyle or recolor): the primary wall and all fixed/built-in structures — windows, doors, built-in/wall-mounted wardrobes, tiles, wall panels, pillars, beams, recesses/niches, skirting, switchboards, paintings painted on wall.

Realistically reconstruct (inpaint) the wall and floor surfaces revealed behind the removed objects, matching the existing colour, texture and lighting. Do NOT change the room geometry, camera angle, perspective, lighting or wall dimensions. Output only the edited image.`;

async function toDataUrl(url){
  if(url.startsWith('data:')) return url;
  const b = await (await fetch(url)).blob();
  return await new Promise(res=>{ const r=new FileReader(); r.onload=()=>res(r.result); r.readAsDataURL(b); });
}
async function emptyRoom(dataUrl){
  const body = { contents:[{ parts:[ { text:EMPTY_PROMPT }, { inline_data:{ mime_type:'image/jpeg', data:dataUrl.split(',')[1] } } ] }],
    generationConfig:{ temperature:0.6, responseModalities:['IMAGE'] } };
  const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${IMG_MODEL}:generateContent?key=${GEMINI_KEY}`,
    { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(body) });
  const j = await res.json();
  if(!res.ok) throw new Error((j.error && j.error.message) || ('HTTP '+res.status));
  const part = (j.candidates?.[0]?.content?.parts || []).find(p=>p.inline_data||p.inlineData);
  if(!part) throw new Error('No image returned');
  const d = part.inline_data || part.inlineData;
  return 'data:'+(d.mime_type||d.mimeType)+';base64,'+d.data;
}
function previewEmpty(id, cat, idx){
  const r = roomById(id); const p = r && r.photos[cat] && r.photos[cat][idx]; if(!p) return;
  const ov = document.createElement('div'); ov.className='ov'; ov.id='qPreview';
  ov.innerHTML = `<div class="ov-top"><button class="ov-x" data-act="q:closepreview">${I.x}</button><span class="ov-title">Empty-room preview</span></div>
    <div class="ov-scroll">
      <div class="pcsub">Original</div><div class="fx-img"><img src="${p.src}"></div>
      <div class="pcsub">Empty room</div><div class="fx-img" id="fx-out"><div class="fx-status">${GEMINI_KEY?'Generating with Gemini… ✨':'Add your Gemini key (GEMINI_KEY in the code) to enable this.'}</div></div>
    </div>`;
  document.body.appendChild(ov); bindActs(ov);
  if(!GEMINI_KEY) return;
  (async()=>{
    try{ const out = await emptyRoom(await toDataUrl(p.src));
      const el=document.getElementById('fx-out'); if(el) el.innerHTML = `<img src="${out}">`; }
    catch(e){ const el=document.getElementById('fx-out'); if(el) el.innerHTML = `<div class="fx-status">Couldn't generate: ${e.message}</div>`; }
  })();
}
function closePreview(){ const el=document.getElementById('qPreview'); if(el) el.remove(); }

/* ═══════════════════════════════════════════════════════════════════════
   DISPATCH
   ═══════════════════════════════════════════════════════════════════════ */
function route(a){
  if(a==='q:report'){ openFullReport(); return; }
  if(a==='q:closereport'){ closeFullReport(); return; }
  if(a==='q:contract'){ openContract(); return; }
  if(a==='q:closecontract'){ closeContract(); return; }
  if(a==='q:addons'){ openAddons(); return; }
  if(a==='q:closeaddons'){ closeAddons(); return; }
  if(a.startsWith('q:addonadd:')){ const i=+a.slice(11); const items=addonItems(); if(items[i]) items[i].added=!items[i].added; recomputeAddonQty(); refreshAddons(); renderRooms(); refreshSummary(); refreshFooter(); return; }
  if(a.startsWith('q:repairs:')){ openRepairsSheet(a.slice(10)); return; }
  if(a==='q:closerepairs'){ closeRepairsSheet(); return; }
  if(a.startsWith('q:why:')){ const el = document.getElementById('why-' + a.slice(6)); if(el) el.style.display = el.style.display === 'none' ? 'block' : 'none'; return; }
  if(a.startsWith('q:addfix:')){ doAddFix(a.slice(9)); return; }
  if(a.startsWith('q:repadd:')){ const i=+a.slice(9); const items=repairItems(); if(items[i]) items[i].added=!items[i].added; refreshRepairsSheet(); refreshSummary(); refreshFooter(); return; }
  if(a.startsWith('qed:'))  return qEdit(a);
  if(a.startsWith('qext:')) return qExtEdit(a);
  if(a.startsWith('qg:'))   return qGlobal(a);
  if(a.startsWith('qpic:')) return qPic(a);
  if(a.startsWith('qfx:')){ const p=a.split(':'); return previewEmpty(p[1],p[2],+p[3]); }
  return qAct(a);
}
function qAct(a){
  const [,verb,arg] = a.split(':');
  if(verb==='back')         return history.length > 1 ? history.back() : (location.href = 'lhp-self-survey-chat (6).html');
  if(verb==='customize')    return openRoomEditor(arg);
  if(verb==='gallery')      return openRoomGallery(arg);
  if(verb==='closegallery') return closeRoomGallery();
  if(verb==='closeeditor')  return closeRoomEditor();
  if(verb==='resetroom')    return applyEdit(Q=>{ const i=Q.rooms.findIndex(x=>x.id===editingRoomId); if(i>=0) Q.rooms[i]=JSON.parse(JSON.stringify(_snapshot)); });
  if(verb==='extoggle')     return QUOTE.exterior.enabled ? applyEdit(Q=>{ Q.exterior.enabled=false; }) : openExteriorEditor();
  if(verb==='extedit')      return openExteriorEditor();
  if(verb==='resetext')     return applyEdit(()=>{ QUOTE.exterior = JSON.parse(JSON.stringify(_snapshot)); });
  if(verb==='removeext')    { closeRoomEditor(); return applyEdit(Q=>{ Q.exterior.enabled=false; }); }
  if(verb==='editpaint')    return openGlobalPaint();
  if(verb==='editroom'){ const el=document.getElementById('qGlobal'); if(el) el.remove(); return openRoomEditor(arg); }
  if(verb==='closeglobal'){ const el=document.getElementById('qGlobal'); if(el) el.remove(); return; }
  if(verb==='closepreview') return closePreview();
  if(verb==='addroom')      return addRoom();
  if(verb==='viewquote'){ const s=document.getElementById('qscroll'); if(s) s.scrollTo({top:0,behavior:'smooth'}); return; }
  if(verb==='addarea')      return openAreaPicker();
  if(verb==='closepicker')  return closeAreaPicker();
  if(verb==='pickarea'){ closeAreaPicker(); return arg==='exterior' ? openExteriorEditor() : addRoomOfType(arg); }
  if(verb==='delroom')     return openConfirmDelete(arg);
  if(verb==='confirmdel'){ closeConfirm(); QUOTE.rooms = QUOTE.rooms.filter(r=>r.id!==arg); renderRooms(); refreshSummary(); refreshFooter(); return; }
  if(verb==='closeconfirm') return closeConfirm();
  if(verb==='book')         return openBooking();
  if(verb==='deltest')      return deleteTestData();
  if(verb==='bookdate'){ bookState.date = +arg;
    document.querySelectorAll('#bookdates .pchip').forEach((b,i)=>b.classList.toggle('on', i===+arg));
    const c=document.getElementById('bookConfirm'); if(c){ c.disabled=false; c.style.opacity=1; } return; }
  if(verb==='confirmbook')  return showBookingSuccess();
  if(verb==='closebook'){ const el=document.getElementById('qBook'); if(el) el.remove(); return; }
}
function qEdit(a){
  const p = a.split(':'); const id=p[1], field=p[2];
  const r = roomById(id); if(!r) return;
  applyEdit(()=>{
    if(field==='bath')      r.bathroom = p[3]==='1';
    else if(field==='balcony') r.balcony = p[3]==='1';
    else if(field==='ceiling') r.ceiling = p[3]==='1';
    else if(field==='walls')   r.walls = Math.max(0, Math.min(8, r.walls + (p[3]==='inc'?1:-1)));
    else if(field==='wallpaint'){ r.wallPaint = p[3]; }
    else if(field==='ceilpaint'){ r.ceilingPaint = p[3]; }
    else if(field==='repair')  r.repair = p[3]==='1';
    else if(field==='wproof')  r.waterproofing = p[3]==='1';
    else if(field==='addon'){ const cat=p[3]; r.addons[cat].qty = p[4]==='1' ? 1 : 0; }
  });
}
function qPic(a){
  const p = a.split(':'); const id=p[1], cat=p[2], op=p[3], idx=parseInt(p[4],10);
  let arr;
  if(id==='ext') arr = QUOTE.exterior.photos;
  else { const rm=roomById(id); if(!rm) return; if(!rm.photos[cat]) rm.photos[cat]=[]; arr=rm.photos[cat]; }
  if(!arr) return;
  if(op==='remove')      return applyEdit(()=>{ arr.splice(idx,1); });
  if(op==='add')         return pickImage(src=> applyEdit(()=>{ arr.push(W(src)); }));
  if(op==='retake')      return pickImage(src=> applyEdit(()=>{ arr[idx]=W(src); }));
  if(op==='recapture')   return pickImage(src=> applyEdit(()=>{ arr[idx]=W(src); }));  // mock: recapture always detects
}

/* ═══════════════════════════════════════════════════════════════════════
   BOOT — prefer a real handoff from the survey (sessionStorage, same origin),
   else fall back to the mock seed above so the page still works standalone.
   ═══════════════════════════════════════════════════════════════════════ */
(function seedFromSurvey(){
  // Prefer an injected global (used by the single-file blob build), else the
  // cross-page sessionStorage handoff.
  let s = (typeof window !== 'undefined' && window.__LHP_SEED__) ? window.__LHP_SEED__ : null;
  if(!s){ let raw = null; try { raw = sessionStorage.getItem('LHP_QUOTE'); } catch(e){} if(!raw) return; try { s = JSON.parse(raw); } catch(e){ console.warn('quote seed parse failed', e); return; } }
  try {
    if(!s || !Array.isArray(s.rooms) || !s.rooms.length) return;
    if(s.bhk != null) QUOTE.bhk = s.bhk;
    if(s.discountPct != null) QUOTE.discountPct = s.discountPct;
    if(s.detected) QUOTE.detected = s.detected;
    if(s.exterior) QUOTE.exterior = s.exterior;
    QUOTE.rooms = s.rooms;
    QUOTE.rooms.forEach(r => {                       // normalize like the mock seed does
      if(r.balcony === undefined) r.balcony = false;
      const a = r.addons || {};
      r.addons = { door:{qty:(a.door||{}).qty||0}, window:{qty:(a.window||{}).qty||0},
                   grill:{qty:(a.grill||{}).qty||0}, cabinet:{qty:(a.cabinet||{}).qty||0} };
      r.photos = Object.assign({ walls:[],door:[],window:[],grill:[],cabinet:[],bathroom:[] }, r.photos || {});
      r.flags = r.flags || {};
      recomputeFlags(r);
    });
    if(!QUOTE.exterior) QUOTE.exterior = { enabled:false, tier:null, walls:[] };
  } catch(e){ console.warn('quote seed parse failed', e); }
})();
